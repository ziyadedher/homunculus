services:
  homunculus:
    build: .
    volumes:
      - ./config/config.toml:/app/config/config.toml:ro
      - ./data/credentials.json:/app/data/credentials.json:ro
      - ./data/token.json:/app/data/token.json:ro
      - homunculus-data:/app/data
    env_file: .env
    restart: unless-stopped

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - homunculus

volumes:
  homunculus-data:
  caddy-data:
  caddy-config:
